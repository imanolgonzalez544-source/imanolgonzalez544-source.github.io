<h2>Project Gallery</h2>
<div class="gallery">
  <img src="images/autogyro1.jpg" alt="CAD render">
  <img src="images/autogyro2.jpg" alt="Autogyro prototype">
  <img src="images/autogyro3.jpg" alt="Autogyro airflow simulation">
</div>\
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin-top: 20px;
}

.gallery img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  display: block;
}
